<svg width="420" height="120" viewBox="0 0 420 120" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Docufy primary logo</title>
  <desc>Docufy logo with document icon and wordmark</desc>
  <rect width="420" height="120" rx="0" fill="white"/>
  <!-- Document base -->
  <rect x="20" y="14" width="76" height="92" rx="8" fill="none" stroke="#111111" stroke-width="2.5"/>
  <!-- Folded corner -->
  <path d="M72 14 L96 38" fill="none" stroke="#111111" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M72 14 L72 38 L96 38" fill="white" stroke="#111111" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Left brace -->
  <path d="M42 66 C38 66 36 64 36 60 L36 56 C36 52 34 50 30 50 C34 50 36 48 36 44 L36 40 C36 36 38 34 42 34"
        fill="none" stroke="#4F8EF7" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right brace -->
  <path d="M70 34 C74 34 76 36 76 40 L76 44 C76 48 78 50 82 50 C78 50 76 52 76 56 L76 60 C76 64 74 66 70 66"
        fill="none" stroke="#4F8EF7" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="56" cy="50" r="2.8" fill="#4F8EF7"/>
  <!-- Wordmark -->
  <text x="112" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="500" fill="#111111">Docufy</text>
  <!-- Tagline -->
  <text x="112" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="#888888" letter-spacing="0.04em">Document intelligence, structured.</text>
</svg>
